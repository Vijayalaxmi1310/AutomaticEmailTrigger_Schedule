name: Daily Email

on:
  schedule:
    # 03:40 PM IST = 05:00 UTC
    - cron: '0 5 * * *'    # 10:30 AM IST
    - cron: '0 11 * * *'   # 4:30 PM IST

  workflow_dispatch:

jobs:
  send-email:

    runs-on: ubuntu-latest

    steps:

      - name: Send Email

        uses: dawidd6/action-send-mail@v3

        with:

          server_address: smtp.gmail.com
          server_port: 465

          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}

          subject: Daily Reminder

          to: vijayalaxmi.kummari@ideabytes.com

          from: ${{ secrets.GMAIL_USERNAME }}

          secure: true

          body: |
            Hello,

            DP,BP,VIP, IIITB Employee, Bangalore Coolie Good Morning/Afternoon/Evening.

            Regards,
            Vijayalaxmi K.
