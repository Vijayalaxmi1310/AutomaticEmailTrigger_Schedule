name: Daily Email

on:
  schedule:
    # 03:40 PM IST = 05:00 UTC
    - cron: '0 5 * * *'

  workflow_dispatch:

jobs:
  send-email:

    runs-on: ubuntu-latest

    steps:

      - name: Send Email

        uses: dawidd6/action-send-mail@v3

        with:

          server_address: smtp.gmail.com
          server_port: 465

          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}

          subject: Daily Reminder

          to: harish.bolishetty@ideabytes.com

          from: GitHub Actions

          secure: true

          body: |
            Hello,

            This is your scheduled email sent every day at 10:30 AM IST.

            Regards,
            GitHub Actions
